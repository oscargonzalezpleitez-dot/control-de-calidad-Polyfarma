version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pharma_qms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pharma_qms}
      POSTGRES_USER: ${POSTGRES_USER:-pharma_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-PharmaQMS@2024!Secure}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - pharma_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pharma_admin} -d ${POSTGRES_DB:-pharma_qms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pharma_qms_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-RedisQMS@2024!}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pharma_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pharma_qms_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pharma_admin}:${POSTGRES_PASSWORD:-PharmaQMS@2024!Secure}@postgres:5432/${POSTGRES_DB:-pharma_qms}
      REDIS_URL: redis://:${REDIS_PASSWORD:-RedisQMS@2024!}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-256-bits}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret-in-production}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-32-char-aes256-key-change-prod!!}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - pharma_network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: pharma_qms_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - pharma_network

  nginx:
    image: nginx:alpine
    container_name: pharma_qms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
    networks:
      - pharma_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  pharma_network:
    driver: bridge
